<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 栄養アドバイザー v6 (Professional Complete)</title>
    <style>
        :root {
            --primary: #1565C0;
            --secondary: #0D47A1;
            --bg: #F5F7FA;
            --text: #2C3E50;
            --accent: #FF8F00;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        h1 {
            color: var(--secondary);
            text-align: center;
            font-size: 1.5rem;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 12px;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        select, input[type="text"] {
            padding: 12px 15px;
            border: 1px solid #CFD8DC;
            border-radius: 6px;
            font-size: 1.05rem;
            background: #FAFAFA;
        }
        input[type="text"] {
            flex-grow: 1;
        }
        .btn-mic {
            background-color: #D32F2F;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        .btn-mic.recording {
            background-color: #B71C1C;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(211, 47, 47, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }
        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
            transition: background-color 0.2s;
        }
        .btn-submit:hover { background-color: var(--secondary); }
        .section {
            background: #FFFFFF;
            border: 1px solid #ECEFF1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: var(--secondary);
            border-bottom: 2px solid #E3F2FD;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            display: inline-block;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin: 2px 6px 2px 0;
        }
        .badge.carbs { background: #FFF3E0; color: #E65100; }
        .badge.protein { background: #FFEBEE; color: #C62828; }
        .badge.fat { background: #EFEBE9; color: #4E342E; }
        .badge.vitamin { background: #E8F5E9; color: #1B5E20; }
        .badge.fiber { background: #F3E5F5; color: #4A148C; }
        
        .nutrition-card {
            background: #F8FDFF;
            border-left: 4px solid var(--primary);
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 0 6px 6px 0;
        }
        .nutrition-card h3 { margin: 0 0 5px 0; font-size: 1.05rem; color: #333; }
        .nutrition-card p { margin: 4px 0; font-size: 0.95rem; color: #555; }
        
        .advice-box {
            background: #FFF8E1;
            border: 1px solid #FFE082;
            padding: 15px;
            margin-top: 20px;
            font-size: 0.95rem;
            border-radius: 6px;
        }
        .advice-box h3 { margin: 0 0 10px 0; color: #F57F17; font-size: 1.1rem; }
        .advice-box ul { margin: 0; padding-left: 20px; }
        .advice-box li { margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 臨床栄養学 AIアドバイザー (完全版)</h1>
    
    <div class="input-group">
        <select id="mealType">
            <option value="朝食">朝食</option>
            <option value="昼食">昼食</option>
            <option value="夕食">夕食</option>
            <option value="間食">間食</option>
        </select>
    </div>
    
    <div class="input-group">
        <input type="text" id="foodInput" placeholder="例：スパゲッティ、鶏肉、トマト、ほうれん草...">
        <button id="micBtn" class="btn-mic" title="音声入力">🎤</button>
    </div>
    
    <button id="submitBtn" class="btn-submit">食事データを解析する</button>

    <div id="currentAnalysis" class="section" style="display: none;">
        <h2>📝 食材の栄養プロファイル</h2>
        <div id="analysisContent"></div>
    </div>

    <div id="dailySummary" class="section">
        <h2>📊 1日の代謝・栄養サマリー</h2>
        <div id="summaryContent">記録がありません。</div>
        <button id="clearBtn" style="margin-top:20px; background:#90A4AE; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">履歴をリセット</button>
    </div>
</div>

<script>
const micBtn = document.getElementById('micBtn');
const foodInput = document.getElementById('foodInput');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    micBtn.addEventListener('click', () => { recognition.start(); micBtn.classList.add('recording'); });
    recognition.onresult = (event) => { foodInput.value = event.results[0][0].transcript; micBtn.classList.remove('recording'); };
    recognition.onspeechend = () => { recognition.stop(); micBtn.classList.remove('recording'); };
    recognition.onerror = () => { micBtn.classList.remove('recording'); alert('音声認識エラー'); };
} else {
    micBtn.style.display = 'none';
}

const submitBtn = document.getElementById('submitBtn');
const mealType = document.getElementById('mealType');
const currentAnalysis = document.getElementById('currentAnalysis');
const analysisContent = document.getElementById('analysisContent');
const summaryContent = document.getElementById('summaryContent');
const clearBtn = document.getElementById('clearBtn');

let history = JSON.parse(localStorage.getItem('nutritionHistoryAI')) || [];
updateSummary();

submitBtn.addEventListener('click', async () => {
    const input = foodInput.value.trim();
    if (!input) return;

    // 解析中のローディング表示
    submitBtn.disabled = true;
    submitBtn.innerText = "⏳ AIが解析中...";
    currentAnalysis.style.display = 'block';
    analysisContent.innerHTML = `<p style="text-align:center; color:#666;">プロの管理栄養士が『${input}』の成分を分析しています...</p>`;

    try {
        // Vercelの裏側（api/analyze.js）へ通信
        const response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ foodText: input })
        });

        const data = await response.json();

        if (response.ok) {
            // AIから返ってきた結果を表示
            analysisContent.innerHTML = `<p><strong>📝 入力:</strong> ${input}</p>` + data.html;

            // 履歴に保存
            history.push({
                id: Date.now(),
                time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}),
                type: mealType.value,
                text: input
            });
            localStorage.setItem('nutritionHistoryAI', JSON.stringify(history));
            
            foodInput.value = '';
            updateSummary();
        } else {
            analysisContent.innerHTML = `<p style="color:red;">エラーが発生しました: ${data.error}</p>`;
        }
    } catch (error) {
        analysisContent.innerHTML = `<p style="color:red;">通信エラーが発生しました。</p>`;
    } finally {
        // ボタンを元に戻す
        submitBtn.disabled = false;
        submitBtn.innerText = "食事データを解析する";
    }
});

clearBtn.addEventListener('click', () => {
    if(confirm("履歴をリセットしますか？")) {
        history = [];
        localStorage.removeItem('nutritionHistoryAI');
        currentAnalysis.style.display = 'none';
        updateSummary();
    }
});

function updateSummary() {
    if (history.length === 0) {
        summaryContent.innerHTML = "記録がありません。";
        return;
    }

    let summaryHTML = "";
    history.forEach(item => {
        summaryHTML += `
            <div style="border-bottom: 1px solid #E0E0E0; padding: 12px 0;">
                <span style="background:var(--primary); color:white; padding:4px 8px; border-radius:4px; font-size:0.85rem; font-weight:bold;">${item.type}</span> 
                <span style="color:#78909C; font-size:0.85rem; margin:0 10px;">${item.time}</span>
                <strong style="color:#263238;">${item.text}</strong>
            </div>`;
    });
    
    // 今回は簡易版のサマリー表示（必要に応じて1日のトータル解析をAIに投げる機能も作れます）
    summaryContent.innerHTML = summaryHTML;
}
</script>

</body>
</html>
