<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 栄養コンシェルジュ v7</title>
    <style>
        :root { --primary: #1565C0; --bg: #F5F7FA; --text: #2C3E50; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        input[type="text"], select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; flex: 1; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-submit { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-summary { background: #2E7D32; color: white; width: 100%; margin-top: 10px; }
        .btn-img { background: #546E7A; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .section { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        #preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-bottom: 10px; }
        .loading { text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥗 AI 栄養コンシェルジュ</h1>
    
    <div class="input-group">
        <select id="mealType">
            <option value="朝食">朝食</option><option value="昼食">昼食</option>
            <option value="夕食">夕食</option><option value="間食">間食</option>
        </select>
        <select id="portionSize">
            <option value="ふつう">量：ふつう</option><option value="少なめ">量：少なめ</option>
            <option value="大盛り">量：大盛り</option>
        </select>
    </div>
    
    <div class="input-group">
        <input type="text" id="foodInput" placeholder="料理名を入力（空欄で写真解析もOK）">
        <label class="btn-img">📸<input type="file" id="imageInput" accept="image/*" style="display:none"></label>
    </div>
    <img id="preview">
    
    <button id="submitBtn" class="btn btn-submit">栄養を解析して記録</button>
    <button id="summaryBtn" class="btn btn-summary">今日の1日総評（点数化）🏆</button>

    <div id="currentAnalysis" class="section" style="display: none;">
        <div id="analysisContent"></div>
    </div>

    <div id="dailySummary" class="section">
        <h3>📊 今日の履歴</h3>
        <div id="historyList">記録なし</div>
        <button id="clearBtn" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">履歴リセット</button>
    </div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    let base64Image = null;

    // 写真が選択された時の処理
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            base64Image = event.target.result.split(',')[1];
            preview.src = event.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    });

    const submitBtn = document.getElementById('submitBtn');
    const summaryBtn = document.getElementById('summaryBtn');
    const historyList = document.getElementById('historyList');

    let history = JSON.parse(localStorage.getItem('nutritionHistoryV7')) || [];
    renderHistory();

    // 通常の解析ボタン
    submitBtn.addEventListener('click', () => callAI(false));

    // 1日総評ボタン
    summaryBtn.addEventListener('click', () => callAI(true));

    async function callAI(isSummary) {
        const foodText = document.getElementById('foodInput').value;
        const portionSize = document.getElementById('portionSize').value;
        const historyContext = history.map(h => `${h.type}: ${h.text}`).join(' / ');

        if (!isSummary && !foodText && !base64Image) {
            alert("料理名を入力するか、写真を撮ってください");
            return;
        }

        const btn = isSummary ? summaryBtn : submitBtn;
        btn.disabled = true;
        btn.innerText = "⏳ AIが考え中...";
        document.getElementById('currentAnalysis').style.display = 'block';
        document.getElementById('analysisContent').innerHTML = `<p class="loading">栄養士が分析しています...</p>`;

        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ foodText, portionSize, historyContext, imageData: base64Image, isSummary })
            });
            const data = await response.json();
            
            document.getElementById('analysisContent').innerHTML = data.html;

            if (!isSummary) {
                history.push({ type: document.getElementById('mealType').value, text: foodText || "写真解析" });
                localStorage.setItem('nutritionHistoryV7', JSON.stringify(history));
                renderHistory();
            }
        } catch (e) {
            document.getElementById('analysisContent').innerHTML = "エラーが発生しました";
        } finally {
            btn.disabled = false;
            btn.innerText = isSummary ? "今日の1日総評（点数化）🏆" : "栄養を解析して記録";
            base64Image = null; preview.style.display = 'none';
        }
    }

    function renderHistory() {
        if (history.length === 0) { historyList.innerText = "記録なし"; return; }
        historyList.innerHTML = history.map(h => `<div><strong>${h.type}</strong>: ${h.text}</div>`).join('');
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
        if (confirm("履歴を消しますか？")) { history = []; localStorage.removeItem('nutritionHistoryV7'); renderHistory(); }
    });
</script>
</body>
</html>
